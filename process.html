<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Process Submission</title>
    <style>
        @font-face {
            font-family: 'Poppins'; src: url(Poppins.ttf);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to top, rgba(0, 40, 72, 1), rgba(16, 62, 98, 1), rgba(30, 88, 128, 1), rgba(159, 227, 238, 1));
            color: whitesmoke;
            max-width: 600px;
            overflow: hidden;
            margin: 0 auto;
            padding: 20px;
            height: 100vh;
        }
        .message {
            padding: 20px;
            border-radius: 23px;
            font-size: 1.2rem;
        }
        .success {
            background-color: rgba(212, 237, 218, 0.6);
            font-family: 'Poppins';
            color: #155724;
            margin-top: 3lh;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: rgba(248, 215, 218, 0.6);
            color: #721c24;
            border: 1px solid #f5c6cb;
            box-shadow: 0 0 20px 1px rgba(167, 208, 234, 0.2);
        }
        a {
            text-decoration: none;
            color: #007bff;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class='message success'>Thank you for your review!<br><a href='form.html'>Submit another review</a></div>
</body>
</html>
